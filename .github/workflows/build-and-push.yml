name: build-and-push

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          SHORT_SHA=${GITHUB_SHA::7}
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Login to Zot registry
        uses: docker/login-action@v3
        with:
          registry: registry.full4media.com
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            registry.full4media.com/apps/todo-app:${{ steps.version.outputs.version }}
            registry.full4media.com/apps/todo-app:sha-${{ steps.version.outputs.short_sha }}
            registry.full4media.com/apps/todo-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update gitops-config deployment
        if: success()
        env:
          GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHORT_SHA="${{ steps.version.outputs.short_sha }}"
          IMAGE="registry.full4media.com/apps/todo-app:${VERSION}"
          git clone "https://x-access-token:${GITOPS_TOKEN}@github.com/asixc/gitops-config.git" /tmp/gitops
          cd /tmp/gitops
          sed -i "s|image: registry.full4media.com/apps/todo-app:.*|image: ${IMAGE}|" \
            apps/base/todo-app/deployment.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/base/todo-app/deployment.yaml
          git diff --cached --quiet || \
            git commit -m "chore(todo-app): bump image to ${VERSION} (sha-${SHORT_SHA})"
          git push
